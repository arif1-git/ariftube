<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIFTUBE — Play YouTube + Local Videos (Responsive)</title>
  <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root{ --brand:#FF0000; --muted:#6b6b6b; --bg:#fafafa }
    *{box-sizing:border-box}
    body{font-family:Inter, Roboto, system-ui, -apple-system, "Segoe UI", Arial; margin:0; background:var(--bg)}

    /* Header */
    .site-header{height:56px;display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid #e9e9e9;background:#fff;position:sticky;top:0;z-index:1100}
    .brand{display:flex;align-items:center;gap:8px;color:var(--brand);font-weight:700;text-decoration:none}
    .brand .text{color:#111}

    .search-area{flex:1;display:flex;justify-content:center}
    .search-box{width:640px;max-width:100%;display:flex;gap:6px}
    .search-input{border-radius:20px 0 0 20px;padding:8px 12px;border:1px solid #e6e6e6}
    .search-btn{border-radius:0 20px 20px 0;border:1px solid #e6e6e6;background:#f7f7f7;padding:8px 12px}

    .actions{display:flex;align-items:center;gap:10px}
    .avatar{width:36px;height:36px;border-radius:50%;background:#d0d0d0;display:inline-flex;align-items:center;justify-content:center}

    /* Offcanvas sidebar for mobile + desktop sidebar */
    .sidebar-desktop{width:240px;border-right:1px solid #eee;padding-top:12px;background:#fff;height:calc(100vh - 56px);overflow:auto}
    .sidebar-desktop .nav-link{color:#111}

    /* Main grid */
    main{padding:12px}
    .thumb{position:relative;border-radius:8px;overflow:hidden}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .duration{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.8);color:#fff;padding:4px 7px;border-radius:6px;font-weight:600;font-size:12px}

    .video-meta{display:flex;gap:10px;margin-top:10px}
    .channel-avatar{width:36px;height:36px;border-radius:50%;flex:0 0 36px}
    .video-title{font-size:.95rem;font-weight:600;margin:0;line-height:1.15;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .video-channel, .video-stats{font-size:13px;color:var(--muted);margin-top:4px}

    /* mobile bottom nav */
    .mobile-nav{display:none}

    /* responsive rules */
    @media (max-width:1199.98px){ .search-box{width:520px} }
    @media (max-width:991.98px){
      .sidebar-desktop{display:none}
      .search-area{display:none}
      .search-toggle{display:inline-flex}
      .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;border-top:1px solid #e9e9e9;background:#fff;align-items:center;justify-content:space-around;z-index:1050}
      main{padding-bottom:70px}
    }
    @media (max-width:575.98px){ .search-box{width:220px} }

    /* small polish */
    a.no-underline{text-decoration:none;color:inherit}
  </style>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <button class="btn btn-link d-md-none p-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasSidebar" aria-controls="offcanvasSidebar"><i class="bi bi-list fs-4"></i></button>
    <a class="brand" href="#"><i class="bi bi-play-btn-fill fs-4" style="color:var(--brand)"></i><span class="text">ARIFTUBE</span></a>

    <div class="search-area d-none d-md-flex">
      <div class="search-box">
        <input id="searchInput" class="form-control search-input" type="search" placeholder="Search" aria-label="Search">
        <button id="searchBtn" class="btn search-btn" aria-label="Search"><i class="bi bi-search"></i></button>
      </div>
    </div>

    <div class="actions ms-auto">
      <button class="btn btn-link d-none d-md-inline" title="Upload"><i class="bi bi-camera-video fs-4"></i></button>
      <button class="btn btn-link" title="Notifications"><i class="bi bi-bell fs-4"></i></button>
      <div class="avatar">A</div>
      <button class="btn btn-link d-md-none search-toggle" id="mobileSearchToggle"><i class="bi bi-search fs-4"></i></button>
    </div>
  </header>

  <!-- Offcanvas sidebar for mobile -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasSidebar" aria-labelledby="offcanvasSidebarLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="offcanvasSidebarLabel">Menu</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body p-0">
      <nav class="nav flex-column p-2">
        <a class="nav-link" href="#"><i class="bi bi-house me-2"></i>Home</a>
        <a class="nav-link" href="#"><i class="bi bi-lightning me-2"></i>Shorts</a>
        <a class="nav-link" href="#"><i class="bi bi-collection-play me-2"></i>Subscriptions</a>
        <hr>
        <a class="nav-link" href="#"><i class="bi bi-book me-2"></i>Library</a>
        <a class="nav-link" href="#"><i class="bi bi-clock-history me-2"></i>History</a>
        <a class="nav-link" href="#"><i class="bi bi-file-earmark-play me-2"></i>Your videos</a>
      </nav>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <!-- Desktop Sidebar -->
      <aside class="col-lg-2 col-md-3 d-none d-md-block sidebar-desktop">
        <nav class="nav flex-column px-2">
          <a class="nav-link d-flex align-items-center py-2" href="#"><i class="bi bi-house me-2"></i>Home</a>
          <a class="nav-link d-flex align-items-center py-2" href="#"><i class="bi bi-lightning me-2"></i>Shorts</a>
          <a class="nav-link d-flex align-items-center py-2" href="#"><i class="bi bi-collection-play me-2"></i>Subscriptions</a>
          <hr>
          <a class="nav-link d-flex align-items-center py-2" href="#"><i class="bi bi-book me-2"></i>Library</a>
          <a class="nav-link d-flex align-items-center py-2" href="#"><i class="bi bi-clock-history me-2"></i>History</a>
          <a class="nav-link d-flex align-items-center py-2" href="#"><i class="bi bi-file-earmark-play me-2"></i>Your videos</a>
        </nav>
      </aside>

      <!-- Main content -->
      <main class="col-lg-10 col-md-9 col-12">
        <div class="row g-3 mt-3 row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4" id="grid">
          <!-- Cards are rendered by JS from sampleVideos array below -->
        </div>
      </main>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav d-lg-none" id="mobileNav">
    <button class="btn btn-link d-flex flex-column align-items-center"><i class="bi bi-house"></i><small>Home</small></button>
    <button class="btn btn-link d-flex flex-column align-items-center"><i class="bi bi-compass"></i><small>Explore</small></button>
    <button class="btn btn-link d-flex flex-column align-items-center"><i class="bi bi-collection-play"></i><small>Subs</small></button>
    <button class="btn btn-link d-flex flex-column align-items-center"><i class="bi bi-book"></i><small>Library</small></button>
  </nav>

  <!-- Watch modal (contains both iframe for YouTube and video tag for mp4) -->
  <div class="modal fade" id="watchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body p-0 bg-black">
          <div id="playerWrapper" class="ratio ratio-16x9 bg-black">
            <iframe id="ytPlayer" src="" title="YouTube player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="display:none;border:0;width:100%;height:100%"></iframe>
            <video id="mp4Player" controls style="display:none;width:100%;height:100%;background:black"></video>
          </div>
        </div>
        <div class="modal-footer">
          <div class="me-auto" id="modalTitle" style="font-weight:600"></div>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // --------- USER VIDEO LIST ---------
    // Replace or extend this array with your own videos. Supported formats:
    // 1) YouTube URL (https://www.youtube.com/watch?v=ID or https://youtu.be/ID)
    // 2) YouTube ID (11-char id)
    // 3) Local MP4 path (ends with .mp4)
    // For YouTube entries, thumbnail is auto-generated. For MP4, provide thumb property or a static image path.
    const sampleVideos = [
      { src: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ', title: 'How to build ARIFTUBE UI — Tutorial', channel: 'Arif Khan', views: '1.2M views', time: '1 year ago', duration: '3:33' },
      { src: 'https://youtu.be/eY52Zsg-KVI', title: 'JavaScript tricks for modern sites', channel: 'Arif Khan', views: '234K views', time: '2 months ago', duration: '8:10' },
      { src: 'https://www.youtube.com/watch?v=3JZ_D3ELwOQ', title: 'CSS Grid deep dive', channel: 'Arif Khan', views: '890K views', time: '3 weeks ago', duration: '12:05' },
      { src: 'vid/vd1.mp4', title: 'Local sample video (mp4)', channel: 'My Channel', views: '4.2K views', time: '1 month ago', duration: '06:20', thumb: 'img/v1.jpg' },
      { src: 'vid/vd2.mp4', title: 'Another local clip (mp4)', channel: 'My Channel', views: '1.5K views', time: '2 weeks ago', duration: '02:45', thumb: 'img/v2.jpg' }
    ];

    // --------- Helpers (no backslash-heavy regex here) ---------
    function extractYouTubeID(url){
      if(!url) return null;
      // if it's already a plain 11-char id (no slashes) assume id
      if(typeof url === 'string' && !url.includes('/') && url.length === 11) return url;
      try{
        const u = new URL(url);
        const host = u.hostname.toLowerCase();
        if(host.indexOf('youtu.be') !== -1){
          const id = u.pathname.replace(/^\//, '').split(/[?&]/)[0];
          if(id) return id;
        }
        if(host.indexOf('youtube.com') !== -1){
          const v = u.searchParams.get('v'); if(v) return v;
          const parts = u.pathname.split('/');
          const embedIndex = parts.indexOf('embed'); if(embedIndex >= 0 && parts[embedIndex+1]) return parts[embedIndex+1];
        }
      }catch(e){ /* not a url */ }
      // fallback: find any 11-char group of allowed characters
      const m = url.match(/([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function isMp4(src){
      if(!src) return false;
      const s = src.split('?')[0].toLowerCase();
      return s.endsWith('.mp4');
    }

    function ytThumbnail(id){ return 'https://i.ytimg.com/vi/' + id + '/hqdefault.jpg'; }

    // lightweight html-escape (no regex backslashes)
    function escapeHtml(s){
      if(s === null || s === undefined) return '';
      return String(s).split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;').split('"').join('&quot;');
    }

    // --------- Render Grid ---------
    const grid = document.getElementById('grid');
    function render(videos){
      grid.innerHTML = '';
      videos.forEach(v => {
        const col = document.createElement('div'); col.className = 'col';
        const card = document.createElement('article'); card.className = 'card h-100 border-0';

        const youtubeId = extractYouTubeID(v.src);
        const thumb = youtubeId ? ytThumbnail(youtubeId) : (v.thumb || 'img/thumb-placeholder.png');
        const duration = v.duration || '';

        card.innerHTML = '
          <div class="thumb">
            <img src="' + thumb + '" alt="' + escapeHtml(v.title) + '">
            <div class="duration">' + escapeHtml(duration) + '</div>
          </div>
          <div class="card-body p-0">
            <div class="video-meta">
              <img class="channel-avatar" src="' + (v.avatar || 'img/avatar-placeholder.png') + '" alt="avatar">
              <div class="flex-grow-1">
                <h6 class="video-title mb-1"><a href="#" class="no-underline play-link">' + escapeHtml(v.title) + '</a></h6>
                <div class="video-channel">' + escapeHtml(v.channel || '') + '</div>
                <div class="video-stats">' + escapeHtml(v.views || '') + ' • ' + escapeHtml(v.time || '') + '</div>
              </div>
            </div>
          </div>';

        // attach data attrs
        const playLink = card.querySelector('.play-link');
        playLink.dataset.src = v.src;
        playLink.dataset.title = v.title;

        // click behavior
        card.querySelector('.thumb').addEventListener('click', ()=> openPlayer(v.src, v.title));
        playLink.addEventListener('click', (e)=>{ e.preventDefault(); openPlayer(v.src, v.title); });

        col.appendChild(card);
        grid.appendChild(col);
      });
    }

    // --------- Player ---------
    const ytPlayer = document.getElementById('ytPlayer');
    const mp4Player = document.getElementById('mp4Player');
    const watchModalEl = document.getElementById('watchModal');
    const modal = new bootstrap.Modal(watchModalEl);
    const modalTitle = document.getElementById('modalTitle');

    function openPlayer(src, title){
      const youtubeId = extractYouTubeID(src);
      if(youtubeId){
        ytPlayer.style.display = 'block'; mp4Player.style.display = 'none';
        ytPlayer.src = 'https://www.youtube.com/embed/' + youtubeId + '?autoplay=1&rel=0';
      } else if(isMp4(src)){
        ytPlayer.style.display = 'none'; mp4Player.style.display = 'block';
        mp4Player.src = src; mp4Player.play().catch(()=>{});
      } else {
        // unknown source -> open in new tab
        window.open(src, '_blank'); return;
      }
      modalTitle.textContent = title || '';
      modal.show();

      // cleanup when modal closes
      watchModalEl.addEventListener('hidden.bs.modal', ()=>{
        ytPlayer.src = '';
        try{ mp4Player.pause(); }catch(e){}
        mp4Player.src = '';
      }, { once:true });
    }

    // --------- Search (client-side) ---------
    document.getElementById('searchBtn')?.addEventListener('click', ()=>{
      const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
      if(!q){ render(sampleVideos); return; }
      const filtered = sampleVideos.filter(v => (v.title || '').toLowerCase().includes(q) || (v.channel || '').toLowerCase().includes(q) || (v.src||'').toLowerCase().includes(q));
      render(filtered);
    });

    document.getElementById('mobileSearchToggle')?.addEventListener('click', ()=>{
      const q = prompt('Search ARIFTUBE'); if(!q) return; const filtered = sampleVideos.filter(v => (v.title||'').toLowerCase().includes(q.toLowerCase())); render(filtered);
    });

    // initial render
    render(sampleVideos);

    // expose for debugging / dynamic updates
    window.ARIFTUBE = { sampleVideos, render, openPlayer };
  </script>
</body>
</html>
